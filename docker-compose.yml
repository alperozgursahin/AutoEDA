version: '3.8'

services:
  db:
    image: postgres:15
    container_name: autoeda_db
    environment:
      POSTGRES_USER: autoeda_user
      POSTGRES_PASSWORD: autoeda_password
      POSTGRES_DB: autoeda
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: autoeda_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
